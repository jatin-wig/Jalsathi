kind = "web"
previewPath = "/"
title = "JalSathi – Rural Water Issue Reporting System"
version = "1.0.0"
id = "artifacts/jalsathi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19063

[services.development]
run = "pnpm --filter @workspace/jalsathi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jalsathi", "run", "build" ]
publicDir = "artifacts/jalsathi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19063"
BASE_PATH = "/"
